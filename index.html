<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mypromt</title>
    <link rel="stylesheet" href="/src/styles/global.css"/>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div class="app">
      <div>
        <expandable-block label="Constitution" expanded="false">
          <input-text id="ct-1" type="text" label="role"></input-text>
          <input-text id="ct-2" type="textarea" label="tech stack"></input-text>
          <app-button class="center" action="getConstitution" text="Copy Constitution" afterClickText="Copied"></app-button>
        </expandable-block>
        <expandable-block label="Tasks">
          <input-text id="ct-3" type="textarea" label="data block"></input-text>
          <app-button class="center" action="getTask" text="Copy Task" afterClickText="Copied"></app-button>
        </expandable-block>
      </div>
    </div>
  </body>
</html>
